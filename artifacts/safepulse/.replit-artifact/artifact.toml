kind = "mobile"
previewPath = "/"
title = "SafePulse"
version = "1.0.0"
id = "artifacts/safepulse"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18582

[services.development]
run = "pnpm --filter @workspace/safepulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safepulse", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/safepulse", "run", "serve" ]

[services.env]
PORT = "18582"
BASE_PATH = "/"
